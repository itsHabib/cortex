# RBAC manifest for Cortex K8s SpawnBackend
#
# Grants the cortex-agent-spawner ServiceAccount the minimum permissions
# needed to create, get, list, and delete Pods in the cortex namespace.
#
# Usage:
#   kubectl apply -f k8s/rbac.yaml
#
# If using a different namespace, update the namespace fields below.

---
apiVersion: v1
kind: Namespace
metadata:
  name: cortex
  labels:
    app.kubernetes.io/managed-by: cortex

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cortex-agent-spawner
  namespace: cortex
  labels:
    app.kubernetes.io/managed-by: cortex
    app.kubernetes.io/component: spawn-backend

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cortex-pod-manager
  namespace: cortex
  labels:
    app.kubernetes.io/managed-by: cortex
    app.kubernetes.io/component: spawn-backend
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "delete", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cortex-pod-manager-binding
  namespace: cortex
  labels:
    app.kubernetes.io/managed-by: cortex
    app.kubernetes.io/component: spawn-backend
subjects:
  - kind: ServiceAccount
    name: cortex-agent-spawner
    namespace: cortex
roleRef:
  kind: Role
  name: cortex-pod-manager
  apiGroup: rbac.authorization.k8s.io
