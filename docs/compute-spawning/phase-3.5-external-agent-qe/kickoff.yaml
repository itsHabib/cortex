phase: "External Agent QE"

goal: >
  Harden ExternalAgent GenServer and executor integration through adversarial
  testing — find bugs, race conditions, and edge cases, then fix them.

system_context: |
  ## What Just Shipped (Phase 3.5)

  ExternalAgent GenServer + executor integration. The code is committed and
  passing 1367 tests + 5 executor-external tests (3 unit, 2 integration).

  ### ExternalAgent GenServer — lib/cortex/agent/external_agent.ex

  - `start_link(opts)` — confirms sidecar in Gateway.Registry, subscribes PubSub
  - `run(server, prompt, opts)` — GenServer.call with :infinity timeout,
    delegates to Provider.External.start/run/stop internally
  - `get_state(server)` — returns name, agent_id, status, agent_info
  - `stop(server)` — GenServer.stop(:normal)
  - PubSub handle_info:
    - :agent_unregistered (matching agent_id) → marks unhealthy
    - :agent_registered (matching name) → re-queries registry, restores healthy
    - :agent_status_changed (matching agent_id) → updates cached status
  - Catch-all handle_info for unmatched events
  - dispatch_via_provider/3 builds fresh Provider.External handle per call
  - find_agent_in_registry/2 catches :exit from dead registry

  ### ExternalSupervisor — lib/cortex/agent/external_supervisor.ex

  - DynamicSupervisor with :one_for_one strategy
  - start_agent(opts) — starts ExternalAgent child, handles :already_started
  - find_agent(name) — delegates to Cortex.Agent.Registry.lookup
  - stop_agent(name) — lookup + terminate_child
  - list_agents() — cross-references Registry with supervisor children

  ### Executor Integration — lib/cortex/orchestration/runner/executor.ex

  - dispatch_to_provider/6 pattern matches on Provider.External module
  - run_via_external_agent/3 → ensure_external_agent/1 → ExternalAgent.run
  - ensure_external_agent/1 does find-or-start via ExternalSupervisor
  - Non-external providers use existing generic start/run/stop path

  ### Existing Test Files
  - test/cortex/agent/external_agent_test.exs — 13 tests
  - test/cortex/agent/external_supervisor_test.exs — 8 tests
  - test/cortex/orchestration/runner/executor_external_test.exs — 5 tests

  ### Key Risk Areas to Probe
  1. Sidecar disconnects mid-task (PubSub arrives during Provider.External.run)
  2. GenServer.call timeout vs Provider.External timeout race
  3. Concurrent ensure_external_agent calls for same team_name
  4. PubSub event with matching name but different agent_id (reconnect scenario)
  5. Registry down during run/3 (not just during init)
  6. ExternalAgent process crash during run — does executor handle it?
  7. stop_agent while run is in progress
  8. list_agents when supervisor has children that aren't ExternalAgents
  9. Provider.External.start returns error inside dispatch_via_provider
  10. Large number of concurrent ExternalAgents under one supervisor

  ## Coding Conventions
  - @moduledoc, @doc, @spec on all public functions
  - defstruct with @enforce_keys for required fields
  - Pattern match in function heads
  - Return {:ok, value} | {:error, reason} from fallible functions
  - Tests mirror lib/ structure, use async: true where safe
  - Do NOT pipe `mix test` to `tail`, `grep`, or any other command — it hangs forever

