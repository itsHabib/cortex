teammates:
  - role: "GenServer Edge Case Engineer"
    doc: genserver-edge-cases.md
    focus: |
      Adversarial testing of the ExternalAgent GenServer itself.

      Probe these scenarios and write tests + fixes:
      1. Sidecar disconnects mid-task — PubSub :agent_unregistered arrives while
         Provider.External.run is blocking inside handle_call. Does the state
         update happen after run returns? Or is it queued? Verify correctness.
      2. run/3 called on a GenServer that crashes mid-dispatch — does the caller
         get a clean {:error, _} or an unhandled exit?
      3. Rapid disconnect/reconnect — agent_unregistered then agent_registered
         in quick succession. Does the GenServer end up healthy with correct
         agent_id?
      4. PubSub event with matching name but stale agent_id — the reconnect
         handler re-queries registry. What if the registry returns :not_found
         (agent already gone again)?
      5. start_link when sidecar exists but Gateway.Registry is overloaded
         (slow response) — does it handle timeouts?
      6. Multiple run/3 calls queued in the GenServer mailbox — second caller
         waits for first to finish. Verify ordering and that both get correct results.
      7. stop/1 called while run/3 is in progress — does the blocked caller get
         a clean error?

      Files to modify:
      - test/cortex/agent/external_agent_test.exs — add edge case tests
      - lib/cortex/agent/external_agent.ex — fix any bugs found

  - role: "Executor Integration QE"
    doc: executor-integration-qe.md
    focus: |
      Adversarial testing of the executor → ExternalAgent integration path.

      Probe these scenarios and write tests + fixes:
      1. ensure_external_agent race — two DAG tiers call ensure_external_agent
         for the same team_name concurrently. find_agent returns :not_found for
         both, both call start_agent. Does :already_started handling work?
      2. ExternalAgent process crashes between ensure_external_agent and run —
         pid is stale. Does the executor get a clean error?
      3. ExternalSupervisor not started (removed from app tree) — does
         ensure_external_agent return a clean error, not crash?
      4. Provider.External.start fails inside ExternalAgent.run (e.g., PendingTasks
         not running) — does the error propagate cleanly to the executor?
      5. Executor timeout (Task.await_many) fires before ExternalAgent.run returns —
         verify the ExternalAgent GenServer isn't left in a bad state.
      6. Same team_name used across multiple DAG runs — verify agent reuse
         doesn't leak state from previous runs.
      7. Verify telemetry events are emitted at the right points (if any exist).

      Files to modify:
      - test/cortex/orchestration/runner/executor_external_test.exs — add edge case tests
      - lib/cortex/orchestration/runner/executor.ex — fix any bugs found
      - lib/cortex/agent/external_supervisor.ex — fix any bugs found
