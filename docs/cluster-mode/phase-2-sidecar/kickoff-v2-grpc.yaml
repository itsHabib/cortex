phase: "Sidecar (gRPC + Go)"

goal: >
  Build the sidecar — a Go binary that runs alongside agents, connects to the
  Cortex gateway via gRPC bidirectional streaming, and exposes a local HTTP API
  that agents call to interact with the mesh. Add a gRPC data-plane endpoint to
  the Cortex gateway alongside the existing Phoenix control plane.

system_context: |
  ## Project Overview

  Cortex is an Elixir/OTP multi-agent orchestration system. Phase 1 built the gateway —
  a Phoenix WebSocket channel and registry where agents connect. Phase 2 pivots the
  agent-facing transport from Phoenix Channels to gRPC, keeping Phoenix for the
  control plane (LiveView dashboard, operator UI).

  ## Architecture — Control Plane vs Data Plane

  ```
  ┌─────────────────────────────────────────────────────────┐
  │                    Cortex                                │
  │                                                         │
  │  ┌─────────────────────┐    ┌────────────────────────┐ │
  │  │  Control Plane       │    │  Data Plane             │ │
  │  │  Phoenix Channels    │    │  gRPC Server            │ │
  │  │  LiveView Dashboard  │    │  (port 4001)            │ │
  │  │  (port 4000)         │    │                         │ │
  │  │                      │    │  AgentGateway service    │ │
  │  │  Operator WebSocket  │    │  - Register stream      │ │
  │  │  Real-time UI        │    │  - Heartbeat            │ │
  │  └─────────────────────┘    │  - TaskResult           │ │
  │           │                  │  - StatusUpdate          │ │
  │           │ PubSub           │  - PeerRequest           │ │
  │           │                  └────────────────────────┘ │
  │           ▼                            ▲                │
  │  ┌─────────────────────┐               │                │
  │  │  Gateway Registry    │◄──────────────┘                │
  │  │  (shared state)      │                                │
  │  └─────────────────────┘                                │
  └─────────────────────────────────────────────────────────┘
                                           │ gRPC
                                           │
  ┌────────────────────────────────────────┐│
  │  Container / Machine                   ││
  │                                        ││
  │  ┌──────────┐      ┌───────────────┐  ││
  │  │  Agent    │──────│   Sidecar     │──┘│
  │  │  (LLM)   │ HTTP │   (Go binary) │   │
  │  │          │:9090 │               │   │
  │  └──────────┘      └───────────────┘   │
  │                                        │
  └────────────────────────────────────────┘
  ```

  ## Why gRPC Instead of Phoenix Channels

  1. **Language-agnostic protocol** — protobuf schema generates clients in any language.
     The sidecar can be Go, Rust, Python — all from the same `.proto` file.
  2. **No Phoenix Channel wire protocol** — Phoenix Channels use a custom envelope
     format (`[join_ref, ref, topic, event, payload]`) that non-Elixir clients must
     reimplement. gRPC avoids this entirely.
  3. **Typed contracts** — protobuf enforces schema at compile time. No JSON
     serialization bugs or stringly-typed fields.
  4. **Bidirectional streaming** — replaces both request/response and push patterns
     in a single connection. Registration, heartbeats, task dispatch, and peer
     requests all flow over one stream.
  5. **Industry standard** — every serious service mesh uses gRPC (Envoy, Linkerd,
     Dapr). Proven at scale.
  6. **Separation of concerns** — Phoenix stays as the control plane (dashboard,
     operator UI). gRPC is the data plane (agent communication).

  ## Protobuf Service Definition (to be defined by Proto Engineer)

  The `.proto` file defines the contract between sidecar and gateway:

  ```protobuf
  syntax = "proto3";
  package cortex.gateway.v1;

  service AgentGateway {
    // Bidirectional stream — the main connection
    // Agent sends: Register, Heartbeat, TaskResult, StatusUpdate
    // Gateway sends: Registered, TaskRequest, PeerRequest
    rpc Connect(stream AgentMessage) returns (stream GatewayMessage);
  }

  message AgentMessage {
    oneof msg {
      RegisterRequest register = 1;
      Heartbeat heartbeat = 2;
      TaskResult task_result = 3;
      StatusUpdate status_update = 4;
      PeerResponse peer_response = 5;
    }
  }

  message GatewayMessage {
    oneof msg {
      RegisterResponse registered = 1;
      TaskRequest task_request = 2;
      PeerRequest peer_request = 3;
      RosterUpdate roster_update = 4;
      Error error = 5;
    }
  }

  message RegisterRequest {
    string name = 1;
    string role = 2;
    repeated string capabilities = 3;
    string auth_token = 4;
    map<string, string> metadata = 5;
  }

  message RegisterResponse {
    string agent_id = 1;
    int32 peer_count = 2;
    string run_id = 3;
  }

  message Heartbeat {
    string agent_id = 1;
    string status = 2;  // idle, working, draining
    int32 active_tasks = 3;
    int32 queue_depth = 4;
  }

  message TaskRequest {
    string task_id = 1;
    string prompt = 2;
    repeated string tools = 3;
    int64 timeout_ms = 4;
    map<string, string> context = 5;
  }

  message TaskResult {
    string task_id = 1;
    string status = 2;  // completed, failed, cancelled
    string result_text = 3;
    int64 duration_ms = 4;
    int32 input_tokens = 5;
    int32 output_tokens = 6;
  }

  message StatusUpdate {
    string agent_id = 1;
    string status = 2;
    string detail = 3;
    float progress = 4;
  }

  message PeerRequest {
    string request_id = 1;
    string from_agent = 2;
    string capability = 3;
    string prompt = 4;
    int64 timeout_ms = 5;
  }

  message PeerResponse {
    string request_id = 1;
    string status = 2;
    string result = 3;
    int64 duration_ms = 4;
  }

  message RosterUpdate {
    repeated AgentInfo agents = 1;
  }

  message AgentInfo {
    string id = 1;
    string name = 2;
    string role = 3;
    repeated string capabilities = 4;
    string status = 5;
    map<string, string> metadata = 6;
  }

  message Error {
    string code = 1;
    string message = 2;
  }
  ```

  ## Sidecar Local HTTP API

  The sidecar exposes a local HTTP/JSON API on port 9090 for the co-located agent.
  This does NOT change from the original design — agents still call localhost:9090.

  ### Mesh Queries
  - `GET /health` — sidecar health check
  - `GET /roster` — list all agents in the mesh
  - `GET /roster/:agent_id` — get details for a specific agent
  - `GET /roster/capable/:capability` — find agents by capability

  ### Messaging
  - `GET /messages` — get pending messages for this agent
  - `POST /messages/:agent_id` — send a message to another agent
  - `POST /broadcast` — broadcast a message to all agents

  ### Agent-to-Agent Invocation
  - `POST /ask/:agent_id` — invoke another agent synchronously
  - `POST /ask/capable/:capability` — invoke by capability

  ### Knowledge
  - `GET /knowledge?topic=X` — query knowledge store
  - `POST /knowledge` — publish a knowledge entry

  ### Status
  - `POST /status` — report progress to Cortex
  - `GET /task` — get current task assignment
  - `POST /task/result` — submit task result

  ## Sidecar Configuration

  Via environment variables (same as before):
  - `CORTEX_GATEWAY_URL` — gRPC address (e.g., cortex:4001)
  - `CORTEX_AGENT_NAME` — agent name for registration
  - `CORTEX_AGENT_ROLE` — agent role description
  - `CORTEX_AGENT_CAPABILITIES` — comma-separated capabilities
  - `CORTEX_AUTH_TOKEN` — bearer token for gateway auth
  - `CORTEX_SIDECAR_PORT` — local HTTP port (default: 9090)
  - `CORTEX_HEARTBEAT_INTERVAL` — heartbeat interval in seconds (default: 15)

  ## Existing Cortex Infrastructure (from Phase 1)

  These Phase 1 modules stay as-is for the control plane. The gRPC server
  writes to the same Gateway.Registry, emits the same PubSub events.

  - `lib/cortex_web/channels/agent_socket.ex` — Phoenix Socket (control plane)
  - `lib/cortex_web/channels/agent_channel.ex` — Phoenix Channel (control plane)
  - `lib/cortex/gateway/registry.ex` — tracks connected agents (shared)
  - `lib/cortex/gateway/registered_agent.ex` — agent struct (shared)
  - `lib/cortex/gateway/protocol.ex` — message parsing (to be replaced by protobuf on data plane)
  - `lib/cortex/gateway/auth.ex` — token authentication (shared)
  - `lib/cortex/gateway/health.ex` — health monitoring (shared)

  ## Tech Stack

  - **Sidecar:** Go 1.22+
  - **gRPC:** protobuf v3, `google.golang.org/grpc` (Go), `grpc` hex package (Elixir)
  - **Proto codegen:** `buf` with `protoc-gen-go`, `protoc-gen-elixir`
  - **Sidecar HTTP:** `chi` router (github.com/go-chi/chi) — lightweight, stdlib-compatible
  - **Sidecar CLI:** `cobra` (github.com/spf13/cobra) — standard Go CLI framework
  - **Sidecar config:** `envconfig` (github.com/kelseyhightower/envconfig) — declarative env var parsing
  - **Sidecar logging:** `slog` (stdlib since Go 1.21) — structured logging
  - **Gateway gRPC server:** `grpc` hex package in Elixir
  - **Build:** `go build`; `docker build` for container

  ## Go Library Choices (IMPORTANT — use these, don't hand-roll)

  | Concern | Library | Why |
  |---------|---------|-----|
  | gRPC client | `google.golang.org/grpc` | Standard, battle-tested |
  | gRPC reconnection | Built-in via `grpc.WithConnectParams` + keepalive | Do NOT reimplement — gRPC handles connection-level reconnect. Only handle stream re-establishment + re-registration. |
  | HTTP router | `chi` (github.com/go-chi/chi) | Lightweight, stdlib-compatible, composable middleware |
  | CLI | `cobra` (github.com/spf13/cobra) | Standard Go CLI framework, handles help/version/subcommands |
  | Config | `envconfig` (github.com/kelseyhightower/envconfig) | Declarative env var parsing into structs with validation tags |
  | Logging | `slog` (stdlib) | Structured logging, built into Go since 1.21 |
  | Graceful shutdown | `signal.NotifyContext` (stdlib) | One-line signal handling with context cancellation |
  | HTTP test server | `net/http/httptest` (stdlib) | Standard test HTTP server |
  | JSON | `encoding/json` (stdlib) | No need for a third-party JSON library |

  ## Coding Conventions

  ### Elixir (gateway side)
  - @moduledoc, @doc, @spec on all public functions
  - defstruct with @enforce_keys for required fields
  - Pattern match in function heads
  - Return {:ok, value} | {:error, reason} from fallible functions
  - Tests mirror lib/ structure, use async: true where safe

  ### Go (sidecar)
  - Exported types and functions have doc comments
  - Error wrapping with `fmt.Errorf("context: %w", err)`
  - Context propagation for cancellation/timeouts
  - Table-driven tests
  - No global state — dependency injection via structs
  - Use `slog` for all logging (not `log` or `fmt.Println`)
  - Use `envconfig` struct tags for config, not manual `os.Getenv` calls

