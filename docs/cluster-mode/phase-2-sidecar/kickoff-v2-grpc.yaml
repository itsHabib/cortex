teammates:
  - role: "Proto & Codegen Engineer"
    doc: proto-codegen.md
    focus: |
      Define the protobuf service contract and set up code generation for
      both Elixir (gateway) and Go (sidecar).

      Files to create:
      - `proto/cortex/gateway/v1/gateway.proto` — service and message definitions
        - AgentGateway service with bidirectional Connect stream
        - All message types: Register, Heartbeat, TaskRequest, TaskResult,
          StatusUpdate, PeerRequest, PeerResponse, RosterUpdate, Error
        - Use proto3 with well-typed fields (no stringly-typed enums)
        - Version the package: `cortex.gateway.v1`
      - `proto/buf.yaml` — buf configuration (linting, breaking change detection)
      - `proto/buf.gen.yaml` — code generation config
        - Go output: `sidecar/internal/proto/`
        - Elixir output: `lib/cortex/gateway/proto/`
      - `Makefile` target: `make proto` — runs buf/protoc to generate code
      - Generated Go code: `sidecar/internal/proto/gatewayv1/`
      - Generated Elixir code: `lib/cortex/gateway/proto/`

      Design notes:
      - Use `buf` over raw `protoc` for better linting and dependency management
      - The Connect RPC uses bidirectional streaming — one long-lived stream
        per sidecar connection. Both sides send messages asynchronously.
      - Use `oneof` for polymorphic message types (AgentMessage, GatewayMessage)
      - Include a `reserved` block for future field IDs
      - Auth token goes in the Register message (not gRPC metadata) for simplicity.
        Can migrate to per-RPC credentials later.

  - role: "Gateway gRPC Engineer"
    doc: gateway-grpc.md
    focus: |
      Add a gRPC server to the Cortex gateway that implements the AgentGateway
      service, writing to the existing Gateway.Registry and emitting PubSub events.

      Files to create:
      - `lib/cortex/gateway/grpc_server.ex` — gRPC service implementation
        - Implement the `Connect` bidirectional stream handler
        - On RegisterRequest: validate auth, create RegisteredAgent, add to Registry
        - On Heartbeat: update agent health in Registry
        - On TaskResult: emit PubSub event, route to task caller
        - On StatusUpdate: update Registry, emit PubSub event
        - On PeerResponse: route back to the requesting agent's stream
        - Push TaskRequest, PeerRequest, RosterUpdate to the agent's stream
        - Handle stream disconnect: unregister agent from Registry
      - `lib/cortex/gateway/grpc_endpoint.ex` — gRPC endpoint configuration
        - Start gRPC server on port 4001 (configurable)
        - TLS optional (for dev, plaintext is fine)
        - Add to the Gateway.Supervisor tree
      - Extend `lib/cortex/gateway/registry.ex` to track gRPC stream pids
        - Add `stream_pid` field to RegisteredAgent (alongside existing `channel_pid`)
        - Add `get_stream(agent_id)` function for pushing messages to gRPC agents
        - Reuse existing `Process.monitor` logic for automatic cleanup on stream death
        - Do NOT create a separate StreamRegistry — extend what's already there
      - `test/cortex/gateway/grpc_server_test.exs`

      Integration:
      - The gRPC server writes to the SAME Gateway.Registry as the Phoenix Channel.
        An agent connected via gRPC and an agent connected via Phoenix Channel
        appear identically in the registry.
      - PubSub events are identical — the LiveView dashboard works with gRPC agents
        without any changes.
      - Gateway.Health monitors gRPC agents the same way (heartbeat timeout).

      Design notes:
      - Use the `grpc` hex package (https://hex.pm/packages/grpc)
      - Each Connect stream runs as a process — use GenServer-like state tracking
      - The stream process monitors the Gateway.Registry for roster changes and
        pushes RosterUpdate messages to the sidecar proactively
      - Auth: validate the token from RegisterRequest against Gateway.Auth module

  - role: "Sidecar Core Engineer"
    doc: sidecar-core.md
    focus: |
      Build the Go sidecar binary — gRPC client connection to Cortex, configuration,
      state management, and auto-reconnect logic.

      Directory: `sidecar/` (new Go module at the project root)

      Files to create:
      - `sidecar/go.mod` — Go module definition
      - `sidecar/go.sum` — dependency lockfile
      - `sidecar/cmd/cortex-sidecar/main.go` — cobra CLI entrypoint
        - Root command with --version flag
        - Reads config via envconfig
        - Starts gRPC connection, HTTP server
        - Uses signal.NotifyContext for graceful shutdown
      - `sidecar/internal/config/config.go` — configuration
        - Struct with `envconfig` tags for declarative env var parsing
        - Required: GatewayURL, AgentName
        - Defaults: Port=9090, HeartbeatInterval=15s, Role="agent"
        - Validation via struct tags + custom Validate() method
      - `sidecar/internal/gateway/client.go` — gRPC client
        - Establish gRPC connection with `grpc.WithConnectParams` for built-in
          connection-level reconnection (do NOT reimplement backoff)
        - Open bidirectional Connect stream
        - Send RegisterRequest on stream open
        - Send periodic Heartbeat messages (use time.Ticker)
        - Receive and dispatch GatewayMessages (TaskRequest, PeerRequest, RosterUpdate)
        - Handle stream-level errors: re-open the stream and re-register
          (the gRPC connection itself reconnects automatically)
        - Expose methods for sending TaskResult, StatusUpdate, PeerResponse
      - `sidecar/internal/state/state.go` — sidecar state
        - Thread-safe state store (sync.RWMutex)
        - Agent ID, connection status, cached roster, pending messages, current task
        - Methods: GetRoster, GetMessages, PopMessages, GetTask, SetTask, etc.
      - `sidecar/internal/gateway/client_test.go`
      - `sidecar/internal/config/config_test.go`
      - `sidecar/internal/state/state_test.go`
      - `sidecar/Dockerfile` — multi-stage build (Go build → distroless)
      - `sidecar/Makefile` — build, test, lint targets

      Design notes:
      - Use `google.golang.org/grpc` for the gRPC client
      - Use `cobra` for CLI, `envconfig` for config, `slog` for logging
      - Use `signal.NotifyContext` for graceful shutdown (one line, stdlib)
      - gRPC handles connection-level reconnect automatically — do NOT
        reimplement exponential backoff for the TCP/HTTP2 connection.
        Only handle stream re-establishment: when the bidirectional stream
        breaks, re-open it and re-send RegisterRequest.
      - The gRPC stream runs in a goroutine; incoming messages are dispatched
        to the state store. The HTTP handlers read from the state store.
      - On stream reconnect, re-send RegisterRequest (new agent ID each time).

  - role: "Sidecar HTTP API Engineer"
    doc: sidecar-http-api.md
    focus: |
      Build the local HTTP/JSON API in Go that agents call to interact with
      the mesh through the sidecar.

      Files to create:
      - `sidecar/internal/api/router.go` — HTTP router setup
        - Mount all handlers
        - JSON middleware (content-type, error formatting)
        - Bind to localhost:CORTEX_SIDECAR_PORT
      - `sidecar/internal/api/health.go` — GET /health
      - `sidecar/internal/api/roster.go` — roster endpoints
        - GET /roster — list all agents from cached state
        - GET /roster/:agent_id — agent details
        - GET /roster/capable/:capability — find by capability
      - `sidecar/internal/api/messages.go` — messaging endpoints
        - GET /messages — get pending messages
        - POST /messages/:agent_id — send message (via gRPC stream)
        - POST /broadcast — broadcast to all agents
      - `sidecar/internal/api/invoke.go` — agent-to-agent invocation
        - POST /ask/:agent_id — synchronous invocation
        - POST /ask/capable/:capability — invoke by capability
        - Blocks until response or timeout
      - `sidecar/internal/api/knowledge.go` — knowledge endpoints
        - GET /knowledge — query knowledge
        - POST /knowledge — publish entry
      - `sidecar/internal/api/status.go` — status and task endpoints
        - POST /status — report progress
        - GET /task — get current task
        - POST /task/result — submit task result
      - `sidecar/internal/api/*_test.go` — handler tests

      Design notes:
      - Use `chi` router (github.com/go-chi/chi) — stdlib-compatible, composable
        middleware, clean URL param extraction
      - Use `slog` for request logging middleware
      - All endpoints return JSON with consistent error format:
        `{"error": "message", "code": "CODE"}`
      - /ask endpoints: send PeerRequest via the gRPC client, wait on a channel
        for the response. Use context.WithTimeout for the blocking wait.
      - Write endpoints check connection status first — return 503 if disconnected
      - Handlers take dependencies (State, GatewayClient) via struct injection,
        not globals
      - Use `net/http/httptest` for handler tests (stdlib, no extra deps)

  - role: "Integration Test Engineer"
    doc: integration-test.md
    focus: |
      Build end-to-end tests that verify the full Go sidecar ↔ gRPC ↔ Elixir
      gateway flow.

      Files to create:
      - `test/cortex/gateway/grpc_integration_test.exs` — Elixir-side integration tests
        - Test: gRPC Connect stream opens, Register received, Registered sent back
        - Test: Heartbeat received, Registry updated
        - Test: Stream disconnects, agent removed from Registry
        - Test: TaskRequest pushed via stream, agent receives it
        - Test: TaskResult received via stream, PubSub event emitted
        - Test: StatusUpdate received, Registry updated
        - Test: PeerRequest routed between two gRPC streams
        - Test: gRPC agents appear in LiveView (same PubSub events as Phoenix agents)
        - Use a gRPC test client in Elixir to simulate the sidecar
      - `sidecar/internal/integration_test.go` — Go-side integration tests
        - Test: sidecar connects to a test gRPC server, registers, receives agent ID
        - Test: sidecar sends heartbeats at configured interval
        - Test: sidecar reconnects after connection drop
        - Test: HTTP API /roster returns agents from cached state
        - Test: HTTP API /ask sends PeerRequest and receives response
        - Test: HTTP API /status sends StatusUpdate via gRPC
        - Start a minimal gRPC test server in Go that echoes messages
      - `test/support/grpc_helpers.ex` — Elixir test helpers
        - Helper to start a gRPC test client
        - Helper to assert gateway events from gRPC connections
      - `sidecar/internal/testutil/mock_server.go` — Go mock gRPC server for tests

      Design notes:
      - Elixir-side tests verify the gateway gRPC server against the proto contract
      - Go-side tests verify the sidecar client + HTTP API against a mock server
      - Full end-to-end (Go sidecar → real Elixir gateway) can be tested via
        `make integration-test` which starts the gateway and sidecar together
      - Use async: false for Elixir integration tests (shared Registry state)
