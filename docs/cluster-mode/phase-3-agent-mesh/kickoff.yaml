teammates:
  - role: "Discovery Engineer"
    doc: discovery-engineer.md
    focus: |
      Build capability-based agent discovery and routing.

      Files to create:
      - `lib/cortex/gateway/discovery.ex` — capability discovery module
        - `find_by_capability(capability, opts)` — find agents with a capability
          - Query Gateway.Registry for agents with matching capability
          - Apply routing strategy (least_loaded, round_robin, random, affinity)
          - Filter by status (only :idle or :working agents, not :disconnected)
          - Return {:ok, registered_agent} | {:error, :no_capable_agent}
        - `find_by_name(name)` — find agent by exact name
        - `list_capabilities()` — list all unique capabilities in the mesh
        - `capability_map()` — map of capability → [agent_ids]
        - Support capability metadata matching (e.g., language: "elixir")
      - `lib/cortex/gateway/router.ex` — request routing
        - `route_request(request, opts)` — route a peer_request or task_request
          - Use Discovery to find the target agent
          - Send the request via the agent's WebSocket channel
          - Track pending requests for response routing
          - Handle timeout (return error if no response within limit)
        - `route_response(response)` — route a response back to the requester
          - Look up the pending request
          - Forward the response to the requesting agent's channel
        - Pending request tracking with timeout cleanup
      - `lib/cortex/gateway/routing_strategy.ex` — pluggable routing strategies
        - Behaviour with `select(agents, request, state)` callback
        - Built-in: LeastLoaded, RoundRobin, Random
        - Configurable per-capability or globally
      - `test/cortex/gateway/discovery_test.exs`
      - `test/cortex/gateway/router_test.exs`
      - `test/cortex/gateway/routing_strategy_test.exs`

  - role: "Agent Tool Engineer"
    doc: agent-tool.md
    focus: |
      Build the ask_agent tool that agents use to invoke other agents, and integrate
      it with the Tool system so it's available to all providers.

      Files to create:
      - `lib/cortex/tool/agent_tool.ex` — Agent invocation tool
        - Implements Tool.Behaviour
        - name: "ask_agent"
        - description: "Invoke another agent in the mesh by capability or name"
        - schema: capability (string, optional), agent_name (string, optional),
          prompt (string, required), timeout_seconds (integer, default 60)
        - execute: route through Gateway.Router
          - If capability provided → Discovery.find_by_capability
          - If agent_name provided → Discovery.find_by_name
          - Send peer_request, wait for response
          - Return result text or error
        - Handle recursion: track call depth, reject if > max_depth (default 5)
        - Handle cycles: track call chain, reject if agent already in chain
      - `lib/cortex/tool/mesh_query_tool.ex` — Mesh query tool
        - Implements Tool.Behaviour
        - name: "mesh_query"
        - description: "Query the agent mesh — list agents, capabilities, status"
        - schema: query_type (enum: roster, capabilities, agent_status),
          filters (optional map)
        - execute: query Gateway.Registry, return formatted results
        - This is read-only — no side effects
      - `test/cortex/tool/agent_tool_test.exs`
      - `test/cortex/tool/mesh_query_tool_test.exs`

      Integration:
      - Register both tools in Tool.Registry on startup
      - These tools should be available to HTTP provider agents (via Tool Bridge)
      - For CLI provider agents, these tools are available via the sidecar HTTP API
        (the sidecar's /ask and /roster endpoints serve the same purpose)

      Design notes:
      - The ask_agent tool is synchronous from the calling agent's perspective — it
        blocks until the target agent responds or times out
      - Call depth tracking prevents infinite recursion (Agent A asks Agent B asks
        Agent A asks Agent B...)
      - Each invocation creates a unique request_id for response routing

  - role: "External Provider Engineer"
    doc: external-provider.md
    focus: |
      Build Provider.External — the bridge between externally registered agents and
      the orchestration layer, so DAG/mesh/gossip modes can use external agents.

      Files to create:
      - `lib/cortex/provider/external.ex` — Provider.External implementation
        - Implements the Provider behaviour
        - `start/1` — validate config, check that required capabilities exist in mesh
          - If no matching agent found, wait briefly or return error
          - Option: `wait_for_agent: true` with timeout — block until a capable agent registers
        - `run/3` — send work to an external agent
          - Use Gateway.Discovery to find a matching agent
          - Send task_request via Gateway.Router
          - Stream status_update events as they arrive (for LiveView)
          - Wait for task_result
          - Build and return TeamResult struct
        - `stop/1` — cancel in-flight task (send cancellation to agent)
        - Handle agent disconnect mid-task — find another capable agent or return error
      - `lib/cortex/provider/external/task_tracker.ex` — track in-flight tasks
        - Map task_id → {agent_id, caller_pid, started_at, timeout}
        - Clean up timed-out tasks
        - Re-route tasks if the agent disconnects
      - `test/cortex/provider/external_test.exs`
      - `test/cortex/provider/external/task_tracker_test.exs`

      Config integration:
      - Update Provider.Resolver to handle `provider: :external`
      - Update Config.Validator to validate external provider config:
        - Must specify `capabilities` list (what capability to look for)
        - Optional: `agent_name` (prefer a specific agent)
        - Optional: `wait_for_agent` (true/false, default false)

      Example YAML:
      ```yaml
      teams:
        - name: security-review
          provider: external
          capabilities: [security-review]
          wait_for_agent: true
      ```

  - role: "Dashboard & Observability Engineer"
    doc: dashboard-observability.md
    focus: |
      Update the LiveView dashboard to visualize the agent mesh, show connected agents,
      capability maps, and invocation flows.

      Files to modify:
      - `lib/cortex_web/live/mesh_live.ex` — enhance existing mesh LiveView
        - Show externally registered agents alongside spawned agents
        - Agent cards with: name, role, capabilities, status, connection time
        - Real-time status updates via PubSub subscription
        - Capability filter — show only agents with a specific capability
        - Health indicators (connected, heartbeat age, load)
      - `lib/cortex_web/live/dashboard_live.ex` — add mesh summary to main dashboard
        - Connected agent count
        - Capability count
        - Active invocations count

      Files to create:
      - `lib/cortex_web/live/mesh_detail_live.ex` — detailed agent view
        - Agent info, current task, invocation history
        - Real-time log stream from the agent (via status_updates)
        - Actions: send message, assign task, disconnect
      - `lib/cortex_web/components/mesh_components.ex` — reusable mesh UI components
        - Agent card component (name, role, capabilities, status badge)
        - Capability tag component (clickable, filters the list)
        - Invocation flow component (shows A → B → C call chain)
        - Mesh topology visualization (SVG or simple grid)
      - `test/cortex_web/live/mesh_live_test.exs`
      - `test/cortex_web/live/mesh_detail_live_test.exs`

      Telemetry dashboards:
      - Add Prometheus metrics for:
        - `cortex_mesh_agents_connected` (gauge)
        - `cortex_mesh_invocations_total` (counter, by capability)
        - `cortex_mesh_invocation_duration_seconds` (histogram)
        - `cortex_mesh_agent_heartbeat_age_seconds` (gauge, per agent)
      - Update Grafana dashboard config in `infra/` if it exists
