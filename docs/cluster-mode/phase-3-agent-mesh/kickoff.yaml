phase: "Agent Mesh"

goal: >
  Build capability-based agent discovery, agent-to-agent tool use (the ask_agent tool),
  Provider.External to bridge external agents into the orchestration layer, and update the
  LiveView dashboard with mesh visualization.

system_context: |
  ## Project Overview

  Cortex is an Elixir/OTP multi-agent orchestration system. Phase 1 built the gateway
  (WebSocket channel, registry, protocol). Phase 2 built the sidecar (local HTTP API,
  Cortex connection, packaging). This phase completes the mesh by adding the intelligence
  layer: how agents find each other, invoke each other, and integrate with Cortex's
  existing orchestration modes.

  ## What This Phase Delivers

  1. **Capability-based discovery** — instead of addressing agents by name, address them
     by what they can do. "Find me an agent that does code-review" → routes to the best
     available agent with that capability.

  2. **Agent-to-agent tool use** — the `ask_agent` tool that any agent can use to invoke
     another agent synchronously. This turns the mesh from "parallel workers" into a
     "service mesh of capabilities."

  3. **Provider.External** — bridges externally registered agents into the Provider
     abstraction from the Compute Spawning feature. The orchestration layer (DAG, mesh,
     gossip) can assign work to external agents the same way it assigns work to local
     or HTTP-spawned agents.

  4. **Dashboard integration** — visualize the mesh, show connected agents, capability
     map, invocation flow.

  ## Agent-to-Agent Tool Use Flow

  When Agent A wants to invoke Agent B:

  1. Agent A calls its sidecar: `POST /ask/capable/code-review {"prompt": "Review this..."}`
  2. Sidecar sends a `peer_request` to Cortex via WebSocket
  3. Cortex Gateway.Discovery finds the best agent with `code-review` capability
  4. Cortex sends `peer_request` to Agent B's channel
  5. Agent B's sidecar receives it, exposes it via `GET /task`
  6. Agent B processes the request, sends `task_result` via sidecar
  7. Cortex routes the result back to Agent A's channel
  8. Agent A's sidecar returns the result to the original `POST /ask` call

  For the agent (LLM), this looks like a tool call:
  ```json
  {
    "name": "ask_agent",
    "description": "Invoke another agent in the mesh by capability or name",
    "input_schema": {
      "type": "object",
      "properties": {
        "capability": {"type": "string", "description": "What capability you need"},
        "agent_name": {"type": "string", "description": "Specific agent name (optional)"},
        "prompt": {"type": "string", "description": "What you want the agent to do"},
        "timeout_seconds": {"type": "integer", "default": 60}
      },
      "required": ["prompt"]
    }
  }
  ```

  ## Capability-Based Routing

  When multiple agents have the same capability, Cortex needs to pick one. Routing strategies:
  - **Least loaded** — pick the agent with fewest active tasks (default)
  - **Round robin** — distribute evenly
  - **Random** — simple, good enough for many cases
  - **Affinity** — prefer the same agent for related requests (e.g., same run)

  Agents advertise capabilities during registration:
  ```json
  "capabilities": ["code-review", "security-review", "test-writing"]
  ```

  Discovery should also support capability metadata:
  ```json
  "capabilities": [
    {"name": "code-review", "languages": ["elixir", "python"]},
    {"name": "security-review", "focus": ["owasp-top-10"]}
  ]
  ```

  ## Provider.External

  Provider.External implements the Provider behaviour (from Compute Spawning feature):
  - `start/1` — look up or wait for an external agent matching the config
  - `run/3` — send a task_request to the agent via the gateway, wait for task_result
  - `stop/1` — no-op (external agents aren't owned by Cortex)

  This means a YAML config can specify:
  ```yaml
  teams:
    - name: security-review
      provider: external
      capabilities: [security-review]
  ```

  And Cortex will find a registered agent with that capability and route the work to it.

  ## Existing Modules (from Phases 1-2)

  Gateway:
  - `lib/cortex_web/channels/agent_channel.ex` — WebSocket channel
  - `lib/cortex/gateway/registry.ex` — agent registry
  - `lib/cortex/gateway/registered_agent.ex` — agent struct (has capabilities field)
  - `lib/cortex/gateway/protocol.ex` — message protocol
  - `lib/cortex/gateway/health.ex` — health monitoring

  Sidecar:
  - `lib/cortex/sidecar/connection.ex` — WebSocket client
  - `lib/cortex/sidecar/router.ex` — local HTTP API
  - `lib/cortex/sidecar/handlers/invoke.ex` — /ask endpoints

  Provider/Spawn (from Compute Spawning feature):
  - `lib/cortex/provider.ex` — Provider behaviour
  - `lib/cortex/provider/resolver.ex` — resolves provider from config
  - `lib/cortex/orchestration/config/schema.ex` — Config structs

  Existing mesh infrastructure:
  - `lib/cortex/mesh/member_list.ex` — SWIM-inspired membership tracking
  - `lib/cortex/mesh/detector.ex` — failure detection
  - `lib/cortex/mesh/config.ex` — mesh configuration
  - `lib/cortex_web/live/mesh_live.ex` — existing mesh LiveView

  Existing tool infrastructure:
  - `lib/cortex/tool/behaviour.ex` — Tool behaviour
  - `lib/cortex/tool/executor.ex` — sandboxed execution
  - `lib/cortex/tool/registry.ex` — tool name → module lookup
  - `lib/cortex/tool/shell.ex` — reference Tool implementation

  ## Coding Conventions
  - @moduledoc, @doc, @spec on all public functions
  - defstruct with @enforce_keys for required fields
  - Pattern match in function heads
  - Return {:ok, value} | {:error, reason} from fallible functions
  - Tests mirror lib/ structure, use async: true where safe

