name: "Cortex Blitz"
workspace_path: /tmp/cortex-blitz

defaults:
  model: sonnet
  max_turns: 200
  permission_mode: bypassPermissions
  timeout_minutes: 120

teams:
  # ============================================================
  # TIER 0 — IDEATION (all 4 teams run in parallel)
  # Each team designs a DSL that compiles to orchestra.yaml
  # ============================================================

  - name: phoenix-ideation
    lead:
      role: "Language Designer — drives syntax design, evaluates tradeoffs, writes the final language spec"
    members:
      - role: "PL Research Analyst"
        focus: "Research Haskell, ML, and functional language patterns relevant to the DSL. Document findings in research-notes.md"
      - role: "Compiler Architect"
        focus: "Design the compilation pipeline — lexer, parser, AST, codegen. Plan the implementation architecture."
      - role: "Spec Writer"
        focus: "Write the full language proposal with syntax examples, grammar sketches, and compilation strategy. Own proposal.md"
    context: |
      You are Team Phoenix in the Cortex Blitz Hackathon. Your mission is to DESIGN a domain-specific language (DSL) for defining multi-agent orchestration workflows.

      THE CHALLENGE:
      Cortex is an Elixir/OTP multi-agent orchestration system that currently uses YAML config files (orchestra.yaml) to define projects. These YAML files are verbose, repetitive, and error-prone. Your job is to design a better language that compiles DOWN to orchestra.yaml.

      Your DSL must be able to express:
      - Project name and defaults (model, max_turns, timeout, permissions)
      - Teams with leads, members, tasks, dependencies, and context
      - DAG structure via dependency declarations (teams depend on other teams)
      - Task definitions with summaries, details, deliverables, and verify commands

      TARGET OUTPUT FORMAT (orchestra.yaml schema):
      ```yaml
      name: "project-name"
      defaults:
        model: sonnet          # LLM model
        max_turns: 200         # max conversation turns
        permission_mode: bypassPermissions
        timeout_minutes: 120
      teams:
        - name: team-name
          lead:
            role: "Role description"
            model: opus          # optional model override
          members:
            - role: "Member role"
              focus: "What this member focuses on"
          depends_on:
            - other-team-name    # creates DAG edges
          context: |
            Free-form text injected into the team's prompt.
            Can reference upstream team outputs.
          tasks:
            - summary: "Short task description"
              details: "Detailed instructions"
              deliverables:
                - "path/to/output/file.md"
              verify: "shell command to verify completion"
      ```

      EXAMPLE — a simple 3-tier DAG in orchestra.yaml:
      ```yaml
      name: "calculator"
      defaults:
        model: haiku
        max_turns: 20
      teams:
        - name: requirements
          lead: { role: "Requirements Analyst" }
          tasks:
            - summary: "Gather requirements"
              deliverables: ["requirements.md"]
        - name: architecture
          lead: { role: "Software Architect" }
          depends_on: [requirements]
          tasks:
            - summary: "Design architecture"
              deliverables: ["architecture.md"]
        - name: implementation
          lead: { role: "Developer" }
          depends_on: [architecture]
          tasks:
            - summary: "Build it"
              deliverables: ["main.go"]
      ```

      YOUR DSL should express that same thing in a fraction of the lines, with better ergonomics.

      HACKATHON RULES:
      - You must produce a proposal at: hackathon/proposals/phoenix/proposal.md
      - The proposal must include: language name, design philosophy, syntax examples showing how it expresses the orchestra.yaml schema, grammar sketch, compilation strategy, and tech stack for the compiler.
      - Show how your DSL expresses BOTH a simple 3-team pipeline AND a complex 10+ team hackathon DAG.
      - You are COMPETING against 3 other teams. Each team has a different language design philosophy.
      - Be creative and ambitious but realistic — your build team has ~45 minutes to implement a working compiler.

      TEAM PHOENIX IDENTITY — Haskell/ML-inspired. Your language should feel functional: algebraic data types, pattern matching, composition via pipelines, type inference. Think about how Haskell's type system could catch orchestration errors at compile time. Your differentiator is SAFETY and COMPOSITION — if it compiles, the DAG is valid.

      OUTPUT DIRECTORY: hackathon/proposals/phoenix/
      Create the directory if it doesn't exist. Primary deliverable: proposal.md
    tasks:
      - summary: "Research functional PL patterns for DSL design"
        details: "Study how Haskell, ML, Dhall, and Nix handle typed configurations and pipeline composition. Identify patterns useful for orchestration DAGs — ADTs for team/task types, do-notation for sequencing, type classes for validation. Document in research-notes.md."
        deliverables:
          - "hackathon/proposals/phoenix/research-notes.md"
        verify: "test -f hackathon/proposals/phoenix/research-notes.md"
      - summary: "Design language syntax with multiple examples"
        details: "Design the core syntax. Show how it expresses: a simple 3-team pipeline, a parallel fan-out/fan-in DAG, a 10-team hackathon with ideation→review→build→judging phases, and team templates/reuse. Include at least 4 syntax examples."
        deliverables:
          - "hackathon/proposals/phoenix/syntax-examples.md"
        verify: "test -f hackathon/proposals/phoenix/syntax-examples.md"
      - summary: "Sketch grammar and compilation pipeline"
        details: "Write a rough grammar (BNF or PEG). Design the compilation pipeline: source → tokens → AST → validated AST → orchestra.yaml. Identify the trickiest parts and how you'll handle them."
        deliverables:
          - "hackathon/proposals/phoenix/grammar.md"
        verify: "test -f hackathon/proposals/phoenix/grammar.md"
      - summary: "Write the final proposal"
        details: "Synthesize research, syntax design, and grammar into a polished proposal.md. Must include: language name, design philosophy, syntax examples for simple and complex DAGs, grammar sketch, compilation strategy, tech stack, and build plan. Show the SAME orchestra.yaml expressed in your DSL vs raw YAML to demonstrate the improvement."
        deliverables:
          - "hackathon/proposals/phoenix/proposal.md"
        verify: "test -f hackathon/proposals/phoenix/proposal.md && wc -l hackathon/proposals/phoenix/proposal.md | awk '{if ($1 >= 30) exit 0; else exit 1}'"

