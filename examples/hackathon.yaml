      TEAM HYDRA IDENTITY — Graph-native and pipeline-oriented. Your language should make DAGs and dataflow VISUAL in the syntax itself. Think about how Unix pipes, Elixir's |> operator, and graph query languages (Cypher, Gremlin) express connections. Nodes and edges should be first-class. Your differentiator is EXPRESSIVENESS — the DAG structure should be obvious from reading the code.

      OUTPUT DIRECTORY: hackathon/proposals/hydra/
      Create the directory if it doesn't exist. Primary deliverable: proposal.md
    tasks:
      - summary: "Research graph and pipeline language patterns"
        details: "Study graph query languages (Cypher, Gremlin), dataflow languages (Lucid, LabVIEW textual), pipeline DSLs (CUE, Jsonnet, Tekton), and Unix pipe composition. Identify patterns for making DAG structure visible in syntax. Document in research-notes.md."
        deliverables:
          - "hackathon/proposals/hydra/research-notes.md"
        verify: "test -f hackathon/proposals/hydra/research-notes.md"
      - summary: "Design language syntax with multiple examples"
        details: "Design the core syntax. Show how it expresses: a simple 3-team pipeline, a parallel fan-out/fan-in DAG, a 10-team hackathon with ideation→review→build→judging phases, and team templates/reuse. Include at least 4 syntax examples. The DAG should be VISIBLE in the syntax."
        deliverables:
          - "hackathon/proposals/hydra/syntax-examples.md"
        verify: "test -f hackathon/proposals/hydra/syntax-examples.md"
      - summary: "Sketch grammar and compilation pipeline"
        details: "Write a rough grammar (BNF or PEG). Design the compilation pipeline: source → tokens → AST → validated graph → orchestra.yaml. Focus on how you validate DAG properties (no cycles, valid edges) at compile time."
        deliverables:
          - "hackathon/proposals/hydra/grammar.md"
        verify: "test -f hackathon/proposals/hydra/grammar.md"
      - summary: "Write the final proposal"
        details: "Synthesize research, syntax design, and grammar into a polished proposal.md. Must include: language name, design philosophy, syntax examples for simple and complex DAGs, grammar sketch, compilation strategy, tech stack, and build plan. Show the SAME orchestra.yaml expressed in your DSL vs raw YAML."
        deliverables:
          - "hackathon/proposals/hydra/proposal.md"
        verify: "test -f hackathon/proposals/hydra/proposal.md && wc -l hackathon/proposals/hydra/proposal.md | awk '{if ($1 >= 30) exit 0; else exit 1}'"

