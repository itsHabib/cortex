  # ============================================================
  # TIER 1 — REVIEW (depends on all 4 ideation teams)
  # ============================================================

  - name: pitch-review
    lead:
      role: "Language Critic — evaluates all 4 DSL proposals for expressiveness, feasibility, and ergonomics"
    members:
      - role: "PL Theory Analyst"
        focus: "Assess each language's formal properties — grammar complexity, parse ambiguity, type soundness, compilation difficulty"
      - role: "DX Analyst"
        focus: "Assess each language's developer experience — readability, learnability, error messages, common-case ergonomics"
    depends_on:
      - phoenix-ideation
      - hydra-ideation
      - titan-ideation
      - nova-ideation
    context: |
      You are the PITCH REVIEWER for the Cortex Blitz Hackathon. Four teams each designed a DSL for agent orchestration. Your job is to catch problems BEFORE teams start building compilers.

      PROPOSALS TO REVIEW:
      1. Team Phoenix (Haskell/ML-inspired): hackathon/proposals/phoenix/proposal.md
      2. Team Hydra (Graph-native/pipeline): hackathon/proposals/hydra/proposal.md
      3. Team Titan (Nix/Dhall/CUE typed config): hackathon/proposals/titan/proposal.md
      4. Team Nova (Minimal scripting): hackathon/proposals/nova/proposal.md

      REVIEW CRITERIA:
      1. EXPRESSIVENESS — Can it express the full orchestra.yaml schema? Are there features it can't represent?
      2. SCOPE — Is the compiler buildable in ~45 minutes? Is the grammar too complex to parse?
      3. AMBIGUITY — Does the syntax have parsing ambiguities? Are there edge cases that break?
      4. ERGONOMICS — How much shorter is it than raw YAML? Is it actually easier to read/write?
      5. OVERLAP — Are any teams converging on the same design? Suggest differentiation.

      Be direct and constructive. The goal is to make sure each team can actually build a working compiler.

      OUTPUT: hackathon/review/review.md
    tasks:
      - summary: "Read all proposals and compare syntax designs"
        details: "Read all 4 proposals thoroughly. Compare their syntax for the same orchestration (3-team pipeline, complex DAG). Create a comparison matrix: expressiveness, verbosity reduction, grammar complexity, implementation difficulty."
        deliverables:
          - "hackathon/review/comparison.md"
        verify: "test -f hackathon/review/comparison.md"
      - summary: "Evaluate feasibility and grammar complexity"
        details: "For each team, assess: Can this grammar be parsed unambiguously? Is the compiler buildable in 45 minutes? Are there features that should be cut for scope? Write specific, actionable feedback."
        deliverables:
          - "hackathon/review/feasibility.md"
        verify: "test -f hackathon/review/feasibility.md"
      - summary: "Write final review with approval status"
        details: "Compile the comparison and feasibility assessment into a final review. For each team, assign: APPROVED (proceed), REVISE (with specific scope cuts or fixes), or PIVOT. Include per-team feedback."
        deliverables:
          - "hackathon/review/review.md"
        verify: "test -f hackathon/review/review.md && grep -cE 'APPROVED|REVISE|PIVOT' hackathon/review/review.md | awk '{if ($1 >= 4) exit 0; else exit 1}'"

  # ============================================================
  # TIER 2 — BUILDING (each depends on pitch-review)
  # Each team builds a working compiler: DSL → orchestra.yaml
  # ============================================================

  - name: phoenix-build
    lead:
      role: "Compiler Engineer — builds the lexer, parser, and codegen. Owns the working compiler."
    members:
      - role: "Parser Developer"
        focus: "Implement the lexer and parser. Build the AST data structures. Handle syntax errors gracefully."
      - role: "Codegen Developer"
        focus: "Implement AST → orchestra.yaml emission. Handle all YAML formatting, escaping, and multi-line strings."
      - role: "QA Engineer"
        focus: "Write test cases — valid programs that should compile, invalid programs that should error. Verify output matches expected YAML."
    depends_on:
      - pitch-review
    context: |
      You are Team Phoenix BUILD PHASE in the Cortex Blitz Hackathon. Your ideation team designed a Haskell/ML-inspired DSL and it has been reviewed.

      READ THESE FIRST:
      1. Your language proposal: hackathon/proposals/phoenix/proposal.md
      2. Review feedback: hackathon/review/review.md — find Team Phoenix's section and incorporate feedback

      YOUR MISSION: Build a working compiler that takes your DSL as input and outputs valid orchestra.yaml.

      REQUIREMENTS:
      - Lexer that tokenizes source files
      - Parser that builds an AST
      - Codegen that emits orchestra.yaml
