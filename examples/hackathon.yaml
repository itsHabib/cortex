  # ============================================================
  # TIER 3 — JUDGING (depends on all 4 build teams)
  # ============================================================

  - name: judges
    lead:
      role: "Head Judge — evaluates all 4 DSL compilers, tests them, and picks the winner"
    members:
      - role: "Language Design Judge"
        focus: "Evaluate syntax elegance, expressiveness, readability, and how well each DSL captures the domain of agent orchestration"
      - role: "Compiler Quality Judge"
        focus: "Evaluate code quality, error handling, test coverage, and engineering rigor of each compiler implementation"
      - role: "Practical Utility Judge"
        focus: "Evaluate which DSL you'd actually WANT to use daily — ergonomics, learning curve, error messages, documentation"
    depends_on:
      - phoenix-build
      - hydra-build
      - titan-build
      - nova-build
    context: |
      You are the JUDGE PANEL for the Cortex Blitz Hackathon. Four teams each designed and built a DSL that compiles to orchestra.yaml. You must evaluate them all and pick a winner.

      SUBMISSIONS TO REVIEW:
      1. Team Phoenix (Haskell/ML-inspired) — Proposal: hackathon/proposals/phoenix/proposal.md | Compiler: hackathon/submissions/phoenix/
      2. Team Hydra (Graph-native/pipeline) — Proposal: hackathon/proposals/hydra/proposal.md | Compiler: hackathon/submissions/hydra/
      3. Team Titan (Typed config / Nix/Dhall) — Proposal: hackathon/proposals/titan/proposal.md | Compiler: hackathon/submissions/titan/
      4. Team Nova (Minimal scripting) — Proposal: hackathon/proposals/nova/proposal.md | Compiler: hackathon/submissions/nova/

      Also read the review feedback at hackathon/review/review.md for context.

      JUDGING CRITERIA (each scored 1-10):
      1. Language Design (30%) — Syntax elegance, expressiveness, how well it captures the orchestration domain. Does the DSL make DAGs easier to reason about than raw YAML?
      2. Compiler Quality (25%) — Code quality, error messages, test coverage, engineering rigor. Does the compiler handle edge cases?
      3. Practical Utility (25%) — Would you actually USE this daily? Learning curve, ergonomics, documentation quality. How much shorter is it than YAML?
      4. Ambition vs Execution (20%) — How well did the team deliver on their proposal? Did they build what they designed?

      PROCESS:
      - Read each team's proposal to understand their design philosophy
      - Review their compiler source code
      - Try to compile their example programs (check README for instructions)
      - Try writing a NEW orchestration in each DSL to test learnability
      - Write individual evaluations before ranking
      - Be fair but differentiate clearly — there should be a clear winner

      IMPORTANT: The winning DSL will actually be developed further as the real Cortex configuration language. Choose the one with the best foundation for a real product.

      OUTPUT: hackathon/judging/results.md
    tasks:
      - summary: "Read all proposals and compare language designs"
        details: "Read all 4 proposals. Compare syntax for the same orchestration. Which DSL is most expressive? Most readable? Most concise? Take detailed notes."
        deliverables:
          - "hackathon/judging/design-notes.md"
        verify: "test -f hackathon/judging/design-notes.md"
      - summary: "Review compiler code quality"
        details: "Review the source code of all 4 compilers. Assess: architecture, error handling, test coverage, code clarity, parser robustness. Score each 1-10."
        deliverables:
          - "hackathon/judging/compiler-scores.md"
        verify: "test -f hackathon/judging/compiler-scores.md"
      - summary: "Test each compiler with examples"
        details: "For each submission, follow the README and try to compile their examples. Also try to write a simple 3-team pipeline in each DSL from scratch. Note which compilers work, which break, and what the error experience is like."
        deliverables:
          - "hackathon/judging/test-results.md"
        verify: "test -f hackathon/judging/test-results.md"
      - summary: "Write final rankings and results"
        details: "Compile all scores: Language Design 30%, Compiler Quality 25%, Practical Utility 25%, Ambition vs Execution 20%. Write results.md with: per-team detailed feedback, scores table, ranking 1st-4th, winner announcement with justification. Recommend which DSL should become the real Cortex configuration language and what improvements it needs."
        deliverables:
          - "hackathon/judging/results.md"
        verify: "test -f hackathon/judging/results.md && grep -i 'winner' hackathon/judging/results.md"
